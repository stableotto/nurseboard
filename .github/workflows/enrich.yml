name: Enrich & Deploy

on:
  schedule:
    - cron: "30 14 * * *"
  workflow_dispatch:

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/nursing_jobs.db
          key: nursing-db-${{ github.run_id }}
          restore-keys: nursing-db-

      - name: Enrich, parse bonuses, and export
        run: |
          python -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(name)s: %(message)s', datefmt='%H:%M:%S')
          logger = logging.getLogger('enrich-only')

          from pipeline.config import DB_PATH
          from pipeline.db import get_connection, get_exportable_jobs, get_stats, delete_unenriched
          from pipeline.enrich import enrich_all
          from pipeline.export import export_for_frontend
          from pipeline.salary import parse_salary, parse_bonus

          # 1. Enrich unenriched jobs
          logger.info('=== Enrichment ===')
          results = enrich_all(DB_PATH)
          total_enriched = 0
          for r in results:
              if r['total'] > 0:
                  logger.info('  %s: %d/%d enriched, %d failed%s', r['ats'], r['success'], r['total'], r['failed'], ' (SKIPPED)' if r['skipped'] else '')
              total_enriched += r['success']

          # 2. Re-parse salary for jobs missing it
          logger.info('=== Salary Re-parse ===')
          conn = get_connection(DB_PATH)
          no_salary = conn.execute(
              '''SELECT url, description_plain FROM jobs
              WHERE enriched_at IS NOT NULL AND removed_at IS NULL
                AND salary_min IS NULL AND description_plain IS NOT NULL
                AND description_plain != \"\"'''
          ).fetchall()
          reparsed = 0
          for row in no_salary:
              sal_min, sal_max = parse_salary(row['description_plain'])
              if sal_min:
                  conn.execute('UPDATE jobs SET salary_min = ?, salary_max = ?, updated_at = datetime(\"now\") WHERE url = ?', (sal_min, sal_max, row['url']))
                  reparsed += 1
          if reparsed:
              conn.commit()
          logger.info('  Re-parsed salary for %d/%d jobs', reparsed, len(no_salary))

          # 3. Parse bonuses
          logger.info('=== Bonus Parse ===')
          no_bonus = conn.execute(
              '''SELECT url, description_plain FROM jobs
              WHERE enriched_at IS NOT NULL AND removed_at IS NULL
                AND bonus IS NULL AND description_plain IS NOT NULL
                AND description_plain != \"\"'''
          ).fetchall()
          bonus_found = 0
          for row in no_bonus:
              bonus = parse_bonus(row['description_plain'])
              if bonus:
                  conn.execute('UPDATE jobs SET bonus = ?, updated_at = datetime(\"now\") WHERE url = ?', (bonus, row['url']))
                  bonus_found += 1
          if bonus_found:
              conn.commit()
          logger.info('  Found bonus in %d/%d jobs', bonus_found, len(no_bonus))

          # 4. Clean up failed enrichments
          cleaned = delete_unenriched(conn)
          conn.commit()
          if cleaned:
              logger.info('  Cleaned %d unenrichable jobs', cleaned)

          # 5. Export and deploy
          conn = get_connection(DB_PATH)
          exportable = get_exportable_jobs(conn)
          stats = get_stats(conn)
          export_for_frontend(exportable, stats)

          logger.info('=== Summary ===')
          logger.info('  Enriched this run: %d', total_enriched)
          logger.info('  Total jobs on site: %d', len(exportable))
          conn.close()
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend --project-name=scrubshifts --commit-dirty=true
