name: Nursing Job Pipeline

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/nursing_jobs.db
          key: nursing-db-${{ github.run_number }}
          restore-keys: nursing-db-

      - name: Run pipeline
        run: python -m pipeline.main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend --project-name=nurseboard
