name: Nursing Job Pipeline

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - quick

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/nursing_jobs.db
          key: nursing-db-${{ github.run_number }}
          restore-keys: nursing-db-

      - name: Run full pipeline
        if: ${{ github.event_name == 'schedule' || inputs.mode != 'quick' }}
        run: python -m pipeline.main

      - name: Quick export (skip scraping/enrichment)
        if: ${{ inputs.mode == 'quick' }}
        run: |
          python -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(name)s: %(message)s', datefmt='%H:%M:%S')
          from pipeline.config import DB_PATH
          from pipeline.db import get_connection, get_exportable_jobs, get_stats
          from pipeline.export import export_for_frontend
          conn = get_connection(DB_PATH)
          exportable = get_exportable_jobs(conn)
          stats = get_stats(conn)
          export_for_frontend(exportable, stats)
          conn.close()
          print(f'Exported {len(exportable)} jobs')
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend --project-name=scrubshifts --commit-dirty=true
